name: Build and Release Dist

on:
  pull_request:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build dist
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Swift version
        run: swift --version

      - name: Build dist package
        run: |
          set -euo pipefail
          if [ '${{ github.event_name }}' = 'release' ]; then
            VERSION='${{ github.event.release.tag_name }}'
          elif [ '${{ github.ref_type }}' = 'tag' ]; then
            VERSION='${{ github.ref_name }}'
          elif [ '${{ github.event_name }}' = 'pull_request' ]; then
            VERSION='pr-${{ github.event.pull_request.number }}-${{ github.run_number }}'
          else
            VERSION='run-${{ github.run_number }}'
          fi
          VERSION="${VERSION#v}" ./scripts/package_rc.sh

      - name: Verify dist artifact set
        run: |
          set -euo pipefail
          test -d dist
          test "$(find dist -type f | wc -l | tr -d ' ')" -gt 0
          test -f dist/SHA256SUMS
          test -f dist/build_manifest.json
          test -f dist/test_report.txt
          test -f dist/static_safety_report.txt
          python3 -c "import json, pathlib; m=json.loads(pathlib.Path('dist/build_manifest.json').read_text()); assert m['test_status']=='pass', m; assert m['static_safety_status']=='pass', m; assert m['packaging_status']=='created', m; print('manifest OK')"

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/* release-assets/
          (cd release-assets && shasum -a 256 * > RELEASE_ASSET_SHA256SUMS.txt)
          ls -la release-assets

      - name: Upload dist workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.event_name }}-${{ github.run_number }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create or update GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' }}
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Download dist workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.event_name }}-${{ github.run_number }}
          path: release-assets

      - name: Create or update release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          ls -la release-assets
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG" release-assets/* --title "$TAG" --generate-notes --verify-tag --repo "$GH_REPO"
          fi
