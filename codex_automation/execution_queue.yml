project: ChromeWheelRouter
strategy: sequential_nodes
owner_intervention: minimal
rules:
  - Codex must read AGENTS.md and ai_context before changing code.
  - Codex must not expand product scope.
  - Codex must update ChromeWheelRouter/docs/development/node_reports/<NODE_ID>.md in every node PR.
  - Codex must run ./scripts/check_all.sh if present.
  - Codex must fix CI failures before declaring node complete.
  - Codex must not claim hardware acceptance.
nodes:
