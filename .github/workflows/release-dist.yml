name: Build and Release Dist

on:
  pull_request:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build dist
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Swift version
        run: swift --version

      - name: Build dist package
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('pr-{0}-{1}', github.event.pull_request.number, github.run_number) }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}" ./scripts/package_rc.sh

      - name: Verify dist artifact set
        run: |
          set -euo pipefail
          test -d dist
          test "$(find dist -type f | wc -l | tr -d ' ')" -gt 0
          test -f dist/SHA256SUMS
          test -f dist/build_manifest.json
          test -f dist/test_report.txt
          test -f dist/static_safety_report.txt
          python3 -c "import json, pathlib; m=json.loads(pathlib.Path('dist/build_manifest.json').read_text()); assert m['test_status']=='pass', m; assert m['static_safety_status']=='pass', m; assert m['packaging_status']=='created', m; print('manifest OK')"

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          safe_ref="$(printf '%s' '${{ github.ref_name }}' | tr '/:' '--')"
          tar -czf "release-assets/dist-${safe_ref}-${{ github.run_number }}.tar.gz" -C dist .
          shasum -a 256 release-assets/* > release-assets/SHA256SUMS.txt
          ls -la release-assets

      - name: Upload dist workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.event_name }}-${{ github.run_number }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create or update GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Download dist workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.event_name }}-${{ github.run_number }}
          path: release-assets

      - name: Create or update release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -la release-assets
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --title "$TAG" --generate-notes --verify-tag
          fi
